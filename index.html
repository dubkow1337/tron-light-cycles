<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TRON: Light Cycles</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ===== ГЛАВНОЕ МЕНЮ ===== -->
    <div id="menuScreen" class="screen active">
        <!-- ФОНОВОЕ ВИДЕО -->
        <video id="bgVideo" autoplay muted loop playsinline>
            <source src="assets/videos/tron-bg.mp4" type="video/mp4">
            <source src="assets/videos/tron-bg.webm" type="video/webm">
            Ваш браузер не поддерживает видео.
        </video>
        
        <div class="menu-container">
            <h1 class="game-title">⚡ TRON: LIGHT CYCLES ⚡</h1>
            
            <div class="menu-section">
                <h3>🎮 ПРОТИВНИК</h3>
                <div class="menu-grid">
                    <button id="menuOpponent2p" class="menu-btn" data-group="opponent">👥 2 ИГРОКА</button>
                    <button id="menuOpponentAI" class="menu-btn" data-group="opponent">🤖 VS AI</button>
                    <button id="menuOpponentSurvival" class="menu-btn" data-group="opponent">☠️ ВЫЖИВАНИЕ</button>
                </div>
            </div>
            
            <div class="menu-section">
                <h3>🏆 РЕЖИМ</h3>
                <div class="menu-grid">
                    <button id="menuMatchClassic" class="menu-btn" data-group="match">⚔️ КЛАССИКА</button>
                    <button id="menuMatchTournament" class="menu-btn" data-group="match">👑 ТУРНИР (до 3)</button>
                </div>
            </div>
            
            <div class="menu-section">
                <button id="menuPlayBtn" class="play-btn">▶ ИГРАТЬ</button>
            </div>
            
            <div class="menu-footer">
                <button id="menuSoundToggle" class="sound-btn">🔊 ЗВУК</button>
                <div class="menu-record">🏆 РЕКОРД: <span id="menuRecordDisplay">0</span></div>
            </div>
        </div>
    </div>
    
    <!-- ===== ИГРОВОЙ ЭКРАН ===== -->
    <div id="gameScreen" class="screen">
        <div class="game-wrapper">
            <!-- Кнопка назад -->
            <button id="backToMenuBtn" class="back-btn">← НАЗАД</button>
            
            <!-- Счёт -->
            <div class="game-score">
                <div class="score blue">
                    <span class="score-label">СИНИЙ</span>
                    <span id="gamePlayer1Score" class="score-value">0</span>
                </div>
                <div class="score-divider">:</div>
                <div class="score orange">
                    <span class="score-label">ОРАНЖЕВЫЙ</span>
                    <span id="gamePlayer2Score" class="score-value">0</span>
                </div>
            </div>
            
            <!-- Игровое поле -->
            <div class="game-area">
                <canvas id="gameCanvas" width="1200" height="800"></canvas>
                <div id="gameMessage" class="game-message"></div>
                <div id="victoryOverlay" class="victory-overlay"></div>
            </div>
        </div>
    </div>
    
    <!-- Скрипты -->
    <script src="js/utils.js"></script>
    <script src="js/player.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/survival.js"></script>
    <script src="js/render.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
